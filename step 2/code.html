<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link rel="icon" type="image/png" href="../images/logo.png" />
    <title>Fast-Forward | Merchant Feedback</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#ffdad7",
              "on-error-container": "#93000a",
              "primary-container": "#e6192e",
              "surface-variant": "#e1e3e4",
              "surface-container-highest": "#e1e3e4",
              "surface-tint": "#c00020",
              "surface-container": "#edeeef",
              "on-secondary-fixed": "#1c1b1b",
              "on-surface": "#191c1d",
              "on-primary": "#ffffff",
              "secondary-fixed": "#e5e2e1",
              "on-tertiary-fixed": "#001f2a",
              "tertiary-fixed-dim": "#77d2f8",
              "tertiary-container": "#007fa2",
              "surface-dim": "#d9dadb",
              tertiary: "#006581",
              "on-primary-fixed": "#410005",
              "on-secondary-fixed-variant": "#474746",
              "on-primary-fixed-variant": "#930016",
              secondary: "#5f5e5e",
              "surface-container-low": "#f3f4f5",
              "on-background": "#191c1d",
              "surface-container-high": "#e7e8e9",
              error: "#ba1a1a",
              "error-container": "#ffdad6",
              "inverse-surface": "#2e3132",
              primary: "#bc001f",
              "secondary-fixed-dim": "#c8c6c5",
              "inverse-primary": "#ffb3ae",
              "surface-container-lowest": "#ffffff",
              outline: "#926e6c",
              "on-secondary": "#ffffff",
              "inverse-on-surface": "#f0f1f2",
              "on-error": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-primary-container": "#fffcff",
              "tertiary-fixed": "#bde9ff",
              "on-secondary-container": "#636262",
              surface: "#f8f9fa",
              "surface-bright": "#f8f9fa",
              "on-tertiary-container": "#fdfdff",
              background: "#f8f9fa",
              "on-tertiary-fixed-variant": "#004d64",
              "on-surface-variant": "#5d3f3d",
              "primary-fixed-dim": "#ffb3ae",
              "secondary-container": "#e2dfde",
              "outline-variant": "#e7bcb9",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "1.5rem",
              full: "9999px",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 24;
      }
      .active-rating-card {
        background-color: #bc001f;
        color: white;
      }
    </style>
    <script src="../forms.js"></script>
  </head>
  <body
    class="bg-surface font-body text-on-surface min-h-screen flex flex-col overflow-x-hidden"
  >
    <!-- Top Navigation Anchor -->
    <header
      class="bg-neutral-50/80 dark:bg-neutral-900/80 backdrop-blur-lg sticky top-0 z-50"
    >
      <div
        class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto"
      >
        <div class="flex items-center gap-2">
          <a href="../index.html" class="flex items-center">
            <img
              alt="Fast-Forward Logo"
              class="h-28 w-auto object-contain"
              src="../images/logo.png"
            />
          </a>
        </div>
        <div class="flex items-center gap-4">
          <button
            class="hover:bg-neutral-200/50 dark:hover:bg-neutral-800/50 transition-colors p-2 rounded-full active:scale-95 duration-200 text-neutral-600 dark:text-neutral-400"
          >
            <span class="material-symbols-outlined">help</span>
          </button>
          <button
            class="hover:bg-neutral-200/50 dark:hover:bg-neutral-800/50 transition-colors p-2 rounded-full active:scale-95 duration-200 text-neutral-600 dark:text-neutral-400"
          >
            <span class="material-symbols-outlined">account_circle</span>
          </button>
        </div>
      </div>
    </header>
    <main
      class="flex-grow flex items-center justify-center p-6 bg-surface-container-low pb-32"
    >
      <div
        class="w-full max-w-4xl bg-surface-container-lowest rounded-xl shadow-lg overflow-hidden flex flex-col md:flex-row"
      >
        <!-- Side Hero / Visual Context -->
        <div
          class="hidden md:block md:w-1/3 relative bg-primary overflow-hidden"
        >
          <img
            class="absolute inset-0 w-full h-full object-cover opacity-60 mix-blend-overlay"
            data-alt="close-up of a delivery professional in a red uniform holding a digital tablet with a focused and professional expression in daylight"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBbied5VS0w3FdIFM_Q5mzBstSeEyAL1K4aYvr5ambVe_csA5tVMdbzP3UEc8GYGh6ySpMO7yampmnGKB6wQcfUXo_stR6LzluEouiaAXjg80o9ZTpQphHuQpoqUEmdT-0JD95y0YMBCIP9i8AurG7wlLc8FTP4io-W5H9cb5y_T2QaMmdA0h6DN6FtfF4_SS-5MFucMNW39vnKAmXsE09hUPi7VHgvPyhm9IXIqIUj3-R5UzuqW4VZXKnd6TYzk6Qm3H0WG0cck84"
          />
          <div
            class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-8"
          >
            <h2
              class="text-white font-headline font-bold text-2xl mb-2 tracking-tight"
            >
              Your Feedback Drives Us.
            </h2>
            <p class="text-white/80 text-sm leading-relaxed">
              Help us sharpen our kinetic precision by rating your recent
              courier experiences.
            </p>
          </div>
        </div>
        <!-- Form Content -->
        <div class="flex-1 p-8 md:p-12">
          <!-- Progress Header -->
          <div class="mb-10">
            <div class="flex justify-between items-end mb-4">
              <div>
                <span
                  class="text-primary font-headline font-extrabold text-sm uppercase tracking-widest block mb-1"
                  >Step 02 of 04</span
                >
                <h1
                  class="text-3xl font-headline font-black text-on-surface tracking-tight"
                >
                  Service Experience
                </h1>
              </div>
              <div
                class="text-on-surface-variant font-label text-sm font-semibold italic"
              >
                50% Complete
              </div>
            </div>
            <!-- Momentum Tracker (Signature Component) -->
            <div
              class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden flex"
            >
              <div
                class="h-full bg-gradient-to-r from-primary to-primary-container w-1/2 rounded-full"
              ></div>
            </div>
          </div>
          <form class="space-y-12">
            <!-- Rating Section: Delivery Speed -->
            <section>
              <h3
                class="font-headline font-bold text-lg mb-4 text-on-surface flex items-center gap-2"
              >
                <span
                  class="material-symbols-outlined text-primary"
                  style="font-variation-settings: &quot;FILL&quot; 1"
                  >speed</span
                >
                Delivery Speed
              </h3>
              <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
                <!-- Excellent -->
                <label class="cursor-pointer group">
                  <input
                    checked=""
                    class="hidden peer"
                    name="deliverySpeed"
                    type="radio"
                    value="Excellent"
                  />
                  <div
                    class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low border-2 border-transparent transition-all group-hover:bg-surface-container-high peer-checked:bg-primary peer-checked:text-white"
                  >
                    <span class="material-symbols-outlined text-3xl mb-2"
                      >rocket_launch</span
                    >
                    <span
                      class="font-label font-bold text-xs uppercase tracking-tighter"
                      >Excellent</span
                    >
                  </div>
                </label>
                <!-- Good -->
                <label class="cursor-pointer group">
                  <input
                    class="hidden peer"
                    name="deliverySpeed"
                    type="radio"
                    value="Good"
                  />
                  <div
                    class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low border-2 border-transparent transition-all group-hover:bg-surface-container-high peer-checked:bg-primary peer-checked:text-white"
                  >
                    <span class="material-symbols-outlined text-3xl mb-2"
                      >sentiment_very_satisfied</span
                    >
                    <span
                      class="font-label font-bold text-xs uppercase tracking-tighter"
                      >Good</span
                    >
                  </div>
                </label>
                <!-- Average -->
                <label class="cursor-pointer group">
                  <input
                    class="hidden peer"
                    name="deliverySpeed"
                    type="radio"
                    value="Average"
                  />
                  <div
                    class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low border-2 border-transparent transition-all group-hover:bg-surface-container-high peer-checked:bg-primary peer-checked:text-white"
                  >
                    <span class="material-symbols-outlined text-3xl mb-2"
                      >sentiment_neutral</span
                    >
                    <span
                      class="font-label font-bold text-xs uppercase tracking-tighter"
                      >Average</span
                    >
                  </div>
                </label>
                <!-- Poor -->
                <label class="cursor-pointer group">
                  <input
                    class="hidden peer"
                    name="deliverySpeed"
                    type="radio"
                    value="Poor"
                  />
                  <div
                    class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low border-2 border-transparent transition-all group-hover:bg-surface-container-high peer-checked:bg-primary peer-checked:text-white"
                  >
                    <span class="material-symbols-outlined text-3xl mb-2"
                      >sentiment_dissatisfied</span
                    >
                    <span
                      class="font-label font-bold text-xs uppercase tracking-tighter"
                      >Poor</span
                    >
                  </div>
                </label>
              </div>
            </section>
            <!-- Rating Section: Reliability -->
            <section>
              <h3
                class="font-headline font-bold text-lg mb-4 text-on-surface flex items-center gap-2"
              >
                <span
                  class="material-symbols-outlined text-primary"
                  style="font-variation-settings: &quot;FILL&quot; 1"
                  >verified_user</span
                >
                Reliability &amp; Handling
              </h3>
              <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
                <label class="cursor-pointer group">
                  <input
                    class="hidden peer"
                    name="reliability"
                    type="radio"
                    value="Excellent"
                  />
                  <div
                    class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low border-2 border-transparent transition-all group-hover:bg-surface-container-high peer-checked:bg-primary peer-checked:text-white"
                  >
                    <span class="material-symbols-outlined text-3xl mb-2"
                      >hotel_class</span
                    >
                    <span
                      class="font-label font-bold text-xs uppercase tracking-tighter"
                      >Excellent</span
                    >
                  </div>
                </label>
                <label class="cursor-pointer group">
                  <input
                    checked=""
                    class="hidden peer"
                    name="reliability"
                    type="radio"
                    value="Good"
                  />
                  <div
                    class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low border-2 border-transparent transition-all group-hover:bg-surface-container-high peer-checked:bg-primary peer-checked:text-white"
                  >
                    <span class="material-symbols-outlined text-3xl mb-2"
                      >sentiment_satisfied</span
                    >
                    <span
                      class="font-label font-bold text-xs uppercase tracking-tighter"
                      >Good</span
                    >
                  </div>
                </label>
                <label class="cursor-pointer group">
                  <input
                    class="hidden peer"
                    name="reliability"
                    type="radio"
                    value="Average"
                  />
                  <div
                    class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low border-2 border-transparent transition-all group-hover:bg-surface-container-high peer-checked:bg-primary peer-checked:text-white"
                  >
                    <span class="material-symbols-outlined text-3xl mb-2"
                      >sentiment_neutral</span
                    >
                    <span
                      class="font-label font-bold text-xs uppercase tracking-tighter"
                      >Average</span
                    >
                  </div>
                </label>
                <label class="cursor-pointer group">
                  <input class="hidden peer" name="reliability" type="radio" />
                  <div
                    class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low border-2 border-transparent transition-all group-hover:bg-surface-container-high peer-checked:bg-primary peer-checked:text-white"
                  >
                    <span class="material-symbols-outlined text-3xl mb-2"
                      >sentiment_very_dissatisfied</span
                    >
                    <span
                      class="font-label font-bold text-xs uppercase tracking-tighter"
                      >Poor</span
                    >
                  </div>
                </label>
              </div>
            </section>
            <!-- Rating Section: Communication -->
            <section>
              <h3
                class="font-headline font-bold text-lg mb-4 text-on-surface flex items-center gap-2"
              >
                <span
                  class="material-symbols-outlined text-primary"
                  style="font-variation-settings: &quot;FILL&quot; 1"
                  >chat_bubble</span
                >
                Communication
              </h3>
              <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
                <label class="cursor-pointer group">
                  <input class="hidden peer" name="comm" type="radio" />
                  <div
                    class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low border-2 border-transparent transition-all group-hover:bg-surface-container-high peer-checked:bg-primary peer-checked:text-white"
                  >
                    <span class="material-symbols-outlined text-3xl mb-2"
                      >forum</span
                    >
                    <span
                      class="font-label font-bold text-xs uppercase tracking-tighter"
                      >Excellent</span
                    >
                  </div>
                </label>
                <label class="cursor-pointer group">
                  <input class="hidden peer" name="comm" type="radio" />
                  <div
                    class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low border-2 border-transparent transition-all group-hover:bg-surface-container-high peer-checked:bg-primary peer-checked:text-white"
                  >
                    <span class="material-symbols-outlined text-3xl mb-2"
                      >sentiment_satisfied</span
                    >
                    <span
                      class="font-label font-bold text-xs uppercase tracking-tighter"
                      >Good</span
                    >
                  </div>
                </label>
                <label class="cursor-pointer group">
                  <input
                    checked=""
                    class="hidden peer"
                    name="comm"
                    type="radio"
                  />
                  <div
                    class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low border-2 border-transparent transition-all group-hover:bg-surface-container-high peer-checked:bg-primary peer-checked:text-white"
                  >
                    <span class="material-symbols-outlined text-3xl mb-2"
                      >sentiment_neutral</span
                    >
                    <span
                      class="font-label font-bold text-xs uppercase tracking-tighter"
                      >Average</span
                    >
                  </div>
                </label>
                <label class="cursor-pointer group">
                  <input class="hidden peer" name="comm" type="radio" />
                  <div
                    class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low border-2 border-transparent transition-all group-hover:bg-surface-container-high peer-checked:bg-primary peer-checked:text-white"
                  >
                    <span class="material-symbols-outlined text-3xl mb-2"
                      >sentiment_dissatisfied</span
                    >
                    <span
                      class="font-label font-bold text-xs uppercase tracking-tighter"
                      >Poor</span
                    >
                  </div>
                </label>
              </div>
            </section>
          </form>
        </div>
      </div>
    </main>
    <!-- Bottom Navigation Shell -->
    <nav
      class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-8 pb-8 pt-4 bg-white/90 dark:bg-neutral-950/90 backdrop-blur-xl shadow-[0px_-12px_32px_rgba(25,28,29,0.06)] rounded-t-3xl"
    >
      <!-- Back Button -->
      <a
        href="../step 1/code.html"
        class="flex flex-row items-center justify-center text-neutral-500 dark:text-neutral-400 px-6 py-3 gap-2 hover:opacity-90 transition-opacity active:scale-[0.98]"
      >
        <span class="material-symbols-outlined text-sm">arrow_back_ios</span>
        <span
          class="font-['Inter'] text-sm font-semibold uppercase tracking-widest"
          >Back</span
        >
      </a>
      <!-- Next Button -->
      <a
        href="../step 3/code.html"
        onclick="collectFormData()"
        class="flex flex-row items-center justify-center bg-gradient-to-r from-red-700 to-red-500 text-white rounded-xl px-8 py-3 gap-2 shadow-lg hover:opacity-90 transition-opacity active:scale-[0.98]"
      >
        <span
          class="font-['Inter'] text-sm font-semibold uppercase tracking-widest"
          >Next</span
        >
        <span class="material-symbols-outlined text-sm">arrow_forward_ios</span>
      </a>
    </nav>
    <!-- Spacer for fixed nav -->
    <div class="h-28"></div>
  </body>
</html>
