<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link rel="icon" type="image/png" href="../images/logo.png" />
    <title>Fast-Forward | Merchant Feedback</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      html { visibility: visible; opacity: 1; }
      body { font-family: 'Manrope', 'Inter', sans-serif; }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#ffdad7",
              "on-error-container": "#93000a",
              "primary-container": "#e6192e",
              "surface-variant": "#e1e3e4",
              "surface-container-highest": "#e1e3e4",
              "surface-tint": "#c00020",
              "surface-container": "#edeeef",
              "on-secondary-fixed": "#1c1b1b",
              "on-surface": "#191c1d",
              "on-primary": "#ffffff",
              "secondary-fixed": "#e5e2e1",
              "on-tertiary-fixed": "#001f2a",
              "tertiary-fixed-dim": "#77d2f8",
              "tertiary-container": "#007fa2",
              "surface-dim": "#d9dadb",
              tertiary: "#006581",
              "on-primary-fixed": "#410005",
              "on-secondary-fixed-variant": "#474746",
              "on-primary-fixed-variant": "#930016",
              secondary: "#5f5e5e",
              "surface-container-low": "#f3f4f5",
              "on-background": "#191c1d",
              "surface-container-high": "#e7e8e9",
              error: "#ba1a1a",
              "error-container": "#ffdad6",
              "inverse-surface": "#2e3132",
              primary: "#bc001f",
              "secondary-fixed-dim": "#c8c6c5",
              "inverse-primary": "#ffb3ae",
              "surface-container-lowest": "#ffffff",
              outline: "#926e6c",
              "on-secondary": "#ffffff",
              "inverse-on-surface": "#f0f1f2",
              "on-error": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-primary-container": "#fffcff",
              "tertiary-fixed": "#bde9ff",
              "on-secondary-container": "#636262",
              surface: "#f8f9fa",
              "surface-bright": "#f8f9fa",
              "on-tertiary-container": "#fdfdff",
              background: "#f8f9fa",
              "on-tertiary-fixed-variant": "#004d64",
              "on-surface-variant": "#5d3f3d",
              "primary-fixed-dim": "#ffb3ae",
              "secondary-container": "#e2dfde",
              "outline-variant": "#e7bcb9",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 24;
      }
      body {
        font-family: "Inter", sans-serif;
      }
      h1,
      h2,
      h3 {
        font-family: "Manrope", sans-serif;
      }
    </style>
    <script src="../forms.js"></script>
  </head>
  <body
    class="bg-surface text-on-surface min-h-screen flex flex-col overflow-x-hidden"
  >
    <!-- TopAppBar -->
    <header
      class="bg-neutral-50/80 dark:bg-neutral-900/80 backdrop-blur-lg docked full-width top-0 z-40"
    >
      <div
        class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto"
      >
        <div class="flex items-center gap-2">
          <a href="../index.html" class="flex items-center">
            <img
              alt="Fast-Forward Logo"
              class="h-28 w-auto object-contain"
              src="../images/logo.png"
            />
          </a>
        </div>
        <div class="flex items-center gap-4">
          <button
            class="p-2 text-neutral-600 dark:text-neutral-400 hover:bg-neutral-200/50 dark:hover:bg-neutral-800/50 transition-colors active:scale-95 duration-200 rounded-full"
          >
            <span class="material-symbols-outlined">help</span>
          </button>
          <button
            class="p-2 text-neutral-600 dark:text-neutral-400 hover:bg-neutral-200/50 dark:hover:bg-neutral-800/50 transition-colors active:scale-95 duration-200 rounded-full"
          >
            <span class="material-symbols-outlined">account_circle</span>
          </button>
        </div>
      </div>
    </header>
    <main
      class="flex-grow flex items-center justify-center p-6 sm:p-12 relative overflow-hidden pb-32"
    >
      <!-- Background Decoration - Kinetic Momentum Path -->
      <div
        class="absolute top-0 right-0 -mr-24 -mt-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"
      ></div>
      <div
        class="absolute bottom-0 left-0 -ml-24 -mb-24 w-96 h-96 bg-primary-container/5 rounded-full blur-3xl"
      ></div>
      <div class="w-full max-w-2xl z-10">
        <!-- Progress Section -->
        <div class="mb-10">
          <div class="flex justify-between items-end mb-4">
            <div>
              <span
                class="text-primary font-bold tracking-widest text-xs uppercase block mb-1"
                >Onboarding journey</span
              >
              <h1
                class="text-3xl font-extrabold tracking-tight text-on-surface"
              >
                Merchant Information
              </h1>
            </div>
            <div class="text-right">
              <span class="text-on-surface-variant font-medium text-sm"
                >Step 1 of 4</span
              >
            </div>
          </div>
          <!-- Signature Component: The Momentum Tracker -->
          <div
            class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden flex"
          >
            <div
              class="h-full w-1/4 bg-gradient-to-r from-primary to-primary-container rounded-full shadow-[0_0_12px_rgba(188,0,31,0.3)]"
            ></div>
          </div>
        </div>
        <!-- Main Form Card -->
        <div
          class="bg-surface-container-lowest rounded-3xl p-8 md:p-12 shadow-[0px_12px_32px_rgba(25,28,29,0.04)]"
        >
          <form class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
              <!-- Business Name -->
              <div class="col-span-full">
                <label
                  class="block text-sm font-semibold text-secondary mb-2 ml-1"
                  for="businessName"
                  >Business Name</label
                >
                <input
                  class="w-full px-6 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary/40 text-on-surface placeholder:text-neutral-400 transition-all outline-none"
                  id="businessName"
                  placeholder="e.g. Kinetic Logistics Ltd."
                  type="text"
                />
              </div>
              <!-- Contact Person -->
              <div class="col-span-full md:col-span-1">
                <label
                  class="block text-sm font-semibold text-secondary mb-2 ml-1"
                  for="contactPerson"
                  >Contact Person</label
                >
                <input
                  class="w-full px-6 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary/40 text-on-surface placeholder:text-neutral-400 transition-all outline-none"
                  id="contactPerson"
                  placeholder="Full name"
                  type="text"
                />
              </div>
              <!-- Phone Number -->
              <div class="col-span-full md:col-span-1">
                <label
                  class="block text-sm font-semibold text-secondary mb-2 ml-1"
                  for="phoneNumber"
                  >Phone Number</label
                >
                <input
                  class="w-full px-6 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary/40 text-on-surface placeholder:text-neutral-400 transition-all outline-none"
                  id="phoneNumber"
                  placeholder="+1 (555) 000-0000"
                  type="tel"
                />
              </div>
              <!-- Type of Business -->
              <div class="col-span-full">
                <label
                  class="block text-sm font-semibold text-secondary mb-2 ml-1"
                  >Type of Business</label
                >
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                  <label class="relative group cursor-pointer">
                    <input
                      checked=""
                      class="peer sr-only"
                      name="businessType"
                      type="radio"
                      value="Retail"
                    />
                    <div
                      class="p-4 bg-surface-container-low peer-checked:bg-primary-fixed peer-checked:ring-2 peer-checked:ring-primary rounded-xl text-center transition-all group-hover:bg-surface-container-high"
                    >
                      <span
                        class="material-symbols-outlined block mb-2 text-primary"
                        >storefront</span
                      >
                      <span
                        class="text-xs font-bold uppercase tracking-wider text-on-surface"
                        >Retail</span
                      >
                    </div>
                  </label>
                  <label class="relative group cursor-pointer">
                    <input
                      class="peer sr-only"
                      name="businessType"
                      type="radio"
                      value="Food & Bev"
                    />
                    <div
                      class="p-4 bg-surface-container-low peer-checked:bg-primary-fixed peer-checked:ring-2 peer-checked:ring-primary rounded-xl text-center transition-all group-hover:bg-surface-container-high"
                    >
                      <span
                        class="material-symbols-outlined block mb-2 text-primary"
                        >restaurant</span
                      >
                      <span
                        class="text-xs font-bold uppercase tracking-wider text-on-surface"
                        >Food &amp; Bev</span
                      >
                    </div>
                  </label>
                  <label class="relative group cursor-pointer">
                    <input
                      class="peer sr-only"
                      name="businessType"
                      type="radio"
                      value="Wholesale"
                    />
                    <div
                      class="p-4 bg-surface-container-low peer-checked:bg-primary-fixed peer-checked:ring-2 peer-checked:ring-primary rounded-xl text-center transition-all group-hover:bg-surface-container-high"
                    >
                      <span
                        class="material-symbols-outlined block mb-2 text-primary"
                        >local_shipping</span
                      >
                      <span
                        class="text-xs font-bold uppercase tracking-wider text-on-surface"
                        >Wholesale</span
                      >
                    </div>
                  </label>
                </div>
              </div>
            </div>
            <!-- Informational Card (Tonal Shift) -->
            <div
              class="bg-surface-container-low rounded-2xl p-5 flex gap-4 items-start border-l-4 border-primary"
            >
              <span class="material-symbols-outlined text-primary mt-0.5"
                >info</span
              >
              <div>
                <p class="text-sm text-on-surface font-medium">
                  Why do we need this?
                </p>
                <p class="text-xs text-on-surface-variant leading-relaxed">
                  This information helps us tailor the delivery dashboard to
                  your specific business operations and dispatch requirements.
                </p>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>
    <!-- BottomNavBar -->
    <nav
      class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-8 pb-8 pt-4 bg-white/90 dark:bg-neutral-950/90 backdrop-blur-xl shadow-[0px_-12px_32px_rgba(25,28,29,0.06)] rounded-t-3xl"
    >
      <a
        href="../index.html"
        class="flex flex-row items-center justify-center text-neutral-500 dark:text-neutral-400 px-6 py-3 gap-2 hover:opacity-90 transition-opacity active:scale-[0.98] transition-transform"
      >
        <span class="material-symbols-outlined" data-icon="arrow_back_ios"
          >arrow_back_ios</span
        >
        <span
          class="font-['Inter'] text-sm font-semibold uppercase tracking-widest"
          >Back</span
        >
      </a>
      <a
        href="../step 2/code.html"
        onclick="collectFormData()"
        class="flex flex-row items-center justify-center bg-gradient-to-r from-red-700 to-red-500 text-white rounded-xl px-8 py-3 gap-2 shadow-lg hover:opacity-90 transition-opacity active:scale-[0.98] transition-transform"
      >
        <span
          class="font-['Inter'] text-sm font-semibold uppercase tracking-widest"
          >Next</span
        >
        <span class="material-symbols-outlined" data-icon="arrow_forward_ios"
          >arrow_forward_ios</span
        >
      </a>
    </nav>
    <!-- Image for Context (Hidden on small screens to maintain form focus) -->
    <div
      class="hidden xl:block fixed right-12 top-1/2 -translate-y-1/2 w-64 h-96 opacity-40 mix-blend-multiply grayscale"
    >
      <img
        alt="Merchant working"
        class="w-full h-full object-cover rounded-3xl"
        data-alt="Modern retail store owner using a digital tablet at a sleek white counter with minimal background"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBD4kMEmgO8YQm2jl2uWMhh1f78MnRQyFYEwXHVevfiXqTgrL8oDbC4EwBRim7Z5EVzXbgZ1Xwk9RZB9PvncAgKWf9EyRJN8lUZwdAYuX3rG8E4RXKptJf3adFuHd4e3TmXc5jeZdw_VesvY8y6-8282-RCyUcTvZU3QCQh26ZnW_JHbxqvLuts2iHikPk0gjcc_sLutlApr_83MePBJPThh71fYAmP0_06WRDnp-stIx2sUiUpb6x80D21k2VaK9EXXK5mrNjgnEU"
      />
    </div>
  </body>
</html>
